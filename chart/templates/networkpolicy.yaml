{{- if .Values.networkPolicy.enabled -}}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "mobilint-device-plugin.fullname" . }}-metrics
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "mobilint-device-plugin.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "mobilint-device-plugin.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.networkPolicy.prometheusNamespace }}
      ports:
        - port: 9400
          protocol: TCP
{{- end }}
