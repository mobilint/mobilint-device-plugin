name: Publish Helm chart to GHCR

# Publishes the chart whenever chart/ changes on master, but only if the
# chart version is not already in the registry. Bump Chart.yaml `version`
# for chart/template changes; update `appVersion` only when the default
# image tag changes. Existing chart versions are never overwritten.
on:
  push:
    branches: [master]
    paths: ['chart/**']

jobs:
  publish-chart:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v4
        with:
          version: v4.2.0

      - name: Publish chart if version is new
        run: |
          version=$(helm show chart chart | awk '/^version:/ {print $2}')
          repo=oci://ghcr.io/${{ github.repository_owner }}/charts
          helm registry login ghcr.io -u ${{ github.actor }} --password-stdin <<< "${{ secrets.GITHUB_TOKEN }}"
          if helm show chart "$repo/mobilint-device-plugin" --version "$version" >/dev/null 2>&1; then
            echo "Chart version $version already published — skipping. Bump chart/Chart.yaml version to release."
          else
            helm package chart
            helm push mobilint-device-plugin-*.tgz "$repo"
            echo "Published chart version $version."
          fi
