apiVersion: v1
kind: Pod
metadata:
  name: mobilint-npu-test
spec:
  restartPolicy: Never
  containers:
    - name: test
      image: busybox:1.36
      command:
        - sh
        - -c
        - |
          echo "MOBILINT_VISIBLE_DEVICES=${MOBILINT_VISIBLE_DEVICES}"
          for dev in $(echo "${MOBILINT_VISIBLE_DEVICES}" | tr ',' ' '); do
            ls -l "/dev/${dev}"
          done
          sleep 3600
      resources:
        limits:
          mobilint.com/npu: 1
