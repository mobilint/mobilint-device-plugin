apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: mobilint-device-plugin
  namespace: kube-system
  labels:
    app: mobilint-device-plugin
    app.kubernetes.io/name: mobilint-device-plugin
    app.kubernetes.io/version: "0.1.0"
    app.kubernetes.io/component: device-plugin
    app.kubernetes.io/part-of: mobilint-platform
    app.kubernetes.io/managed-by: kubectl
spec:
  selector:
    matchLabels:
      app: mobilint-device-plugin
  template:
    metadata:
      labels:
        app: mobilint-device-plugin
        app.kubernetes.io/name: mobilint-device-plugin
        app.kubernetes.io/version: "0.1.0"
        app.kubernetes.io/component: device-plugin
        app.kubernetes.io/part-of: mobilint-platform
        app.kubernetes.io/managed-by: kubectl
    spec:
      priorityClassName: system-node-critical
      tolerations:
        - operator: Exists
      nodeSelector:
        mobilint.com/npu.present: "true"
      containers:
        - name: mobilint-device-plugin
          image: mobilint-device-plugin:v0.1.0 # TODO: change this to registry before production
          imagePullPolicy: IfNotPresent
          securityContext:
            privileged: false
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
          ports:
            - name: metrics
              containerPort: 9400
              protocol: TCP
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 128Mi
          volumeMounts:
            - name: device-plugin
              mountPath: /var/lib/kubelet/device-plugins
            - name: dev
              mountPath: /dev
              readOnly: true
      volumes:
        - name: device-plugin
          hostPath:
            path: /var/lib/kubelet/device-plugins
            type: Directory
        - name: dev
          hostPath:
            path: /dev
            type: Directory
