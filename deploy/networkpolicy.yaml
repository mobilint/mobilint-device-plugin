apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: mobilint-device-plugin-metrics
  namespace: kube-system
  labels:
    app: mobilint-device-plugin
    app.kubernetes.io/name: mobilint-device-plugin
    app.kubernetes.io/component: device-plugin
    app.kubernetes.io/part-of: mobilint-platform
spec:
  podSelector:
    matchLabels:
      app: mobilint-device-plugin
  policyTypes:
    - Ingress
  ingress:
    # Allow Prometheus (default: namespace "monitoring") to scrape :9400/metrics.
    # Adjust namespaceSelector if your Prometheus runs in a different namespace.
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - port: 9400
          protocol: TCP
